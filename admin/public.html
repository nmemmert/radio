<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">Radio</title>
<meta name="description" id="page-desc" content="Live internet radio">
<meta property="og:title"       id="og-title" content="Radio">
<meta property="og:description" id="og-desc"  content="Live internet radio">
<meta property="og:type" content="website">
<style>
  :root {
    color-scheme: dark;
    --bg:     #0b0b10;
    --card:   rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #6c5ce7;
    --accentH:#7d70ea;
    --muted:  #9a9aa5;
    --green:  #2ecc71;
    --text:   #f2f2f5;
    --r:      16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 60% 0%, #1a1030 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 40px 16px 80px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  /* ---- Header ---- */
  .station-header { text-align: center; margin-bottom: 36px; }
  .station-name { font-size: 32px; font-weight: 800; letter-spacing: -.5px; }
  .station-desc { font-size: 15px; color: var(--muted); margin-top: 6px; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 14px; padding: 5px 14px; border-radius: 20px;
    background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.25);
    font-size: 13px; font-weight: 600; color: var(--green);
  }
  .live-badge.offline { background: rgba(255,255,255,.05); border-color: var(--border); color: var(--muted); }
  .pulse {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  .live-badge.offline .pulse { background: #555; animation: none; }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(.85); }
  }

  /* ---- Player card ---- */
  .player-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 32px 28px; text-align: center; margin-bottom: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  /* Waveform animation */
  .wave { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 36px; margin-bottom: 24px; }
  .wave-bar {
    width: 4px; border-radius: 2px; background: var(--accent);
    opacity: .7; transform-origin: bottom;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s;    height: 40%; }
  .wave-bar:nth-child(2) { animation-delay: .15s;  height: 70%; }
  .wave-bar:nth-child(3) { animation-delay: .3s;   height: 100%; }
  .wave-bar:nth-child(4) { animation-delay: .45s;  height: 55%; }
  .wave-bar:nth-child(5) { animation-delay: .6s;   height: 80%; }
  .wave-bar:nth-child(6) { animation-delay: .75s;  height: 45%; }
  .wave-bar:nth-child(7) { animation-delay: .9s;   height: 65%; }
  @keyframes wave {
    0%,100% { transform: scaleY(1); }
    50%      { transform: scaleY(.35); }
  }
  .wave.paused .wave-bar { animation-play-state: paused; }

  .now-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 8px; }
  .track-title  { font-size: 20px; font-weight: 700; line-height: 1.3; min-height: 26px; }
  .track-artist { font-size: 15px; color: var(--muted); margin-top: 4px; min-height: 20px; }

  .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 24px; }
  .play-btn {
    width: 72px; height: 72px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .15s; box-shadow: 0 8px 24px rgba(108,92,231,.4);
  }
  .play-btn:hover { background: var(--accentH); }
  .play-btn:active { transform: scale(.95); }
  .vol-wrap { display: flex; align-items: center; gap: 8px; }
  .vol-wrap input[type="range"] { width: 100px; }
  .vol-icon { font-size: 18px; color: var(--muted); }
  .listeners { font-size: 13px; color: var(--muted); margin-top: 16px; }

  /* ---- Sections ---- */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 22px 24px; margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 14px; }

  .hist-list { list-style: none; }
  .hist-list li { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-top: 1px solid var(--border); font-size: 14px; gap: 12px; }
  .hist-list li:first-child { border-top: none; }
  .h-info { flex: 1; min-width: 0; }
  .h-title  { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-artist { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .h-ago    { color: var(--muted); font-size: 12px; white-space: nowrap; flex-shrink: 0; }

  .sched-list { list-style: none; }
  .sched-list li { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid var(--border); font-size: 14px; }
  .sched-list li:first-child { border-top: none; }
  .sched-icon { font-size: 18px; flex-shrink: 0; }
  .sched-info { flex: 1; }
  .sched-name { font-weight: 500; }
  .sched-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sched-now  { font-size: 11px; background: rgba(46,204,113,.12); color: var(--green); border: 1px solid rgba(46,204,113,.25); border-radius: 20px; padding: 2px 8px; }

  /* Embed section */
  .embed-box { background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: monospace; font-size: 12px; color: var(--muted); word-break: break-all; cursor: text; user-select: all; line-height: 1.6; }
  .copy-btn { margin-top: 10px; }

  .empty { color: var(--muted); font-size: 13px; }

  /* Range input style */
  input[type="range"] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: rgba(255,255,255,.15); outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">

  <div class="station-header">
    <div class="station-name" id="station-name">Radio</div>
    <div class="station-desc" id="station-desc"></div>
    <div class="live-badge offline" id="live-badge">
      <div class="pulse"></div>
      <span id="live-text">Connecting…</span>
    </div>
  </div>

  <div class="player-card">
    <div class="wave paused" id="wave">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="now-label">Now Playing</div>
    <div class="track-title" id="track-title">—</div>
    <div class="track-artist" id="track-artist"></div>

    <div class="controls">
      <div class="vol-wrap">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volume" min="0" max="100" value="80">
      </div>
      <button class="play-btn" id="play-btn" aria-label="Play">&#9654;</button>
      <div style="width:128px"></div>
    </div>
    <div class="listeners" id="listeners"></div>
  </div>

  <!-- Recently Played -->
  <div class="section">
    <div class="section-title">Recently Played</div>
    <ul class="hist-list" id="hist-list"><li><span class="empty">Loading…</span></li></ul>
  </div>

  <!-- Schedule -->
  <div class="section" id="sched-section">
    <div class="section-title">Schedule</div>
    <ul class="sched-list" id="sched-list"><li><span class="empty">Loading…</span></li></ul>
  </div>

  <!-- Embed -->
  <div class="section">
    <div class="section-title">Embed this player</div>
    <div class="embed-box" id="embed-code"></div>
    <button class="btn copy-btn" id="copy-btn"
      style="margin-top:10px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;cursor:pointer">
      Copy
    </button>
    <p style="font-size:12px;color:var(--muted);margin-top:10px">Paste this into any webpage to embed the live player.</p>
  </div>

</div>

<audio id="audio" preload="none"></audio>

<script>
const audio   = document.getElementById('audio');
const playBtn = document.getElementById('play-btn');
const volEl   = document.getElementById('volume');
const wave    = document.getElementById('wave');

audio.volume = volEl.value / 100;
let playing = false;

playBtn.addEventListener('click', () => {
  if (playing) { audio.pause(); return; }
  audio.src = '/stream?_=' + Date.now();
  audio.play().catch(() => {});
});
audio.addEventListener('playing', () => {
  playing = true;
  playBtn.innerHTML = '&#10074;&#10074;';
  playBtn.setAttribute('aria-label', 'Pause');
  wave.classList.remove('paused');
});
audio.addEventListener('pause', () => {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  playBtn.setAttribute('aria-label', 'Play');
  wave.classList.add('paused');
});
volEl.addEventListener('input', () => { audio.volume = volEl.value / 100; });

// ---------------------------------------------------------------------------
// Status
// ---------------------------------------------------------------------------
async function refreshStatus() {
  try {
    const data   = await fetch('/status-json.xsl', {cache:'no-store'}).then(r=>r.json());
    let   source = data.icestats?.source;
    if (Array.isArray(source)) source = source.find(s=>s.listenurl?.endsWith('/stream'))||source[0];
    const badge = document.getElementById('live-badge');
    if (source) {
      badge.classList.remove('offline');
      document.getElementById('live-text').textContent = 'Live';
      const name = source.server_name || 'Radio';
      const desc = source.server_description || '';
      document.getElementById('station-name').textContent = name;
      document.getElementById('station-desc').textContent = desc;
      document.getElementById('page-title').textContent  = name;
      document.getElementById('og-title').content        = name;
      document.getElementById('og-desc').content         = desc;
      let title = source.title || '', artist = source.artist || '';
      if (!artist && title.includes(' - ')) [artist, title] = title.split(' - ', 2);
      document.getElementById('track-title').textContent  = title  || '—';
      document.getElementById('track-artist').textContent = artist || '';
      const n = source.listeners ?? 0;
      document.getElementById('listeners').textContent = n + ' listener' + (n===1?'':'s') + ' right now';
    } else {
      badge.classList.add('offline');
      document.getElementById('live-text').textContent = 'Offline';
      document.getElementById('listeners').textContent = '';
    }
  } catch {
    document.getElementById('live-text').textContent = 'Unavailable';
  }
}

// ---------------------------------------------------------------------------
// History
// ---------------------------------------------------------------------------
function timeAgo(iso) {
  try {
    const diff = (Date.now() - new Date(iso.replace(' ','T')+'Z').getTime()) / 1000;
    if (diff < 60)   return 'just now';
    if (diff < 3600) return Math.round(diff/60) + 'm ago';
    return Math.round(diff/3600) + 'h ago';
  } catch { return ''; }
}

async function loadHistory() {
  const data = await fetch('/api/public/history').then(r=>r.json()).catch(()=>[]);
  const ul   = document.getElementById('hist-list');
  if (!data.length) { ul.innerHTML='<li><span class="empty">Nothing played yet.</span></li>'; return; }
  ul.innerHTML = data.map(t => `<li>
    <div class="h-info">
      <div class="h-title">${esc(t.title||'—')}</div>
      ${t.artist ? `<div class="h-artist">${esc(t.artist)}</div>` : ''}
    </div>
    <div class="h-ago">${timeAgo(t.ts)}</div>
  </li>`).join('');
}

// ---------------------------------------------------------------------------
// Schedule
// ---------------------------------------------------------------------------
function parseLiqTime(str) {
  // Parses Liquidsoap time predicates like "8h-10h", "8h30-9h45", "0h-8h"
  const m = str.match(/^(\d+)h(\d+)?-(\d+)h(\d+)?$/);
  if (!m) return str;
  const fmt = (h, min) => {
    const hh = parseInt(h), mm = parseInt(min||0);
    const period = hh < 12 ? 'AM' : 'PM';
    const h12 = hh % 12 || 12;
    return mm ? `${h12}:${String(mm).padStart(2,'0')} ${period}` : `${h12} ${period}`;
  };
  return `${fmt(m[1],m[2])} – ${fmt(m[3],m[4])}`;
}

function isNowInWindow(str) {
  const m = str.match(/^(\d+)h(\d+)?-(\d+)h(\d+)?$/);
  if (!m) return false;
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const start = parseInt(m[1])*60 + parseInt(m[2]||0);
  const end   = parseInt(m[3])*60 + parseInt(m[4]||0);
  return cur >= start && cur < end;
}

async function loadSchedule() {
  const data = await fetch('/api/public/schedule').then(r=>r.json()).catch(()=>[]);
  const ul   = document.getElementById('sched-list');
  const sec  = document.getElementById('sched-section');
  if (!data.length) { sec.hidden = true; return; }
  sec.hidden = false;
  ul.innerHTML = data.map(e => {
    const isNow = e.time && isNowInWindow(e.time);
    return `<li>
      <div class="sched-icon">🎵</div>
      <div class="sched-info">
        <div class="sched-name">${esc(e.name)}</div>
        ${e.time ? `<div class="sched-time">${esc(parseLiqTime(e.time))}</div>` : ''}
      </div>
      ${isNow ? '<span class="sched-now">On air</span>' : ''}
    </li>`;
  }).join('');
}

// ---------------------------------------------------------------------------
// Embed code
// ---------------------------------------------------------------------------
function setEmbedCode() {
  const origin = window.location.origin;
  const code = `<iframe src="${origin}/embed" width="320" height="160" frameborder="0" allow="autoplay" style="border-radius:12px"></iframe>`;
  document.getElementById('embed-code').textContent = code;
  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
refreshStatus();
loadHistory();
loadSchedule();
setEmbedCode();
setInterval(refreshStatus, 10000);
setInterval(loadHistory,  30000);
setInterval(loadSchedule, 60000);
</script>
</body>
</html>
