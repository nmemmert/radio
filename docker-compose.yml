services:
  icecast:
    image: ghcr.io/nmemmert/radio-icecast:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks:
      - default
      - npm

  liquidsoap:
    image: ghcr.io/nmemmert/radio-liquidsoap:latest
    restart: unless-stopped
    depends_on:
      - icecast
    env_file: .env
    volumes:
      - ${MUSIC_DIR}:/music:ro
    networks:
      - default

networks:
  default:
  npm:
    external: true
    name: ${NPM_NETWORK}
