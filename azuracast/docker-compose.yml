name: azuracast
services:
  azuracast:
    container_name: azuracast
    image: ghcr.io/azuracast/azuracast:latest
    restart: unless-stopped
    environment:
      - AZURACAST_HTTP_PORT=8080
      - AZURACAST_HTTPS_PORT=8443
      - AZURACAST_SFTP_PORT=2022
      - AZURACAST_PUID=1000
      - AZURACAST_PGID=1000
      - MYSQL_PASSWORD=changeme-mysql-password
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - AUTO_ASSIGN_PORT_MIN=9000
      - AUTO_ASSIGN_PORT_MAX=9499
