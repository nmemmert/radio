    volumes:
      - type: bind
        source: /DATA/AppData/azuracast/stations
        target: /var/azuracast/stations
      - type: bind
        source: /DATA/AppData/azuracast/backups
        target: /var/azuracast/backups
      - type: bind
        source: /DATA/AppData/azuracast/db
        target: /var/lib/mysql
      - type: bind
        source: /DATA/AppData/azuracast/uploads
        target: /var/azuracast/storage/uploads
      - type: bind
        source: /DATA/AppData/azuracast/shoutcast2
        target: /var/azuracast/storage/shoutcast2
      - type: bind
        source: /DATA/AppData/azuracast/stereo_tool
        target: /var/azuracast/storage/stereo_tool
      - type: bind
        source: /DATA/AppData/azuracast/rsas
        target: /var/azuracast/storage/rsas
      - type: bind
        source: /DATA/AppData/azuracast/geoip
        target: /var/azuracast/storage/geoip
      - type: bind
        source: /DATA/AppData/azuracast/sftpgo
        target: /var/azuracast/storage/sftpgo
      - type: bind
        source: /DATA/AppData/azuracast/acme
        target: /var/azuracast/storage/acme
      - type: bind
        source: /media/Plex/Media/Music/Shared Music
        target: /var/azuracast/library
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    x-casaos:
      envs:
        - container: AZURACAST_HTTP_PORT
          description:
            en_us: "Internal web UI port. Keep off 80/443 since Nginx Proxy Manager already uses those."
        - container: AZURACAST_HTTPS_PORT
          description:
            en_us: "Internal HTTPS port (unused if NPM terminates SSL for you)"
        - container: AZURACAST_SFTP_PORT
          description:
            en_us: "SFTP port for uploading station media directly"
        - container: AZURACAST_PUID
          description:
            en_us: "User ID files are written as on the host"
        - container: AZURACAST_PGID
          description:
            en_us: "Group ID files are written as on the host"
        - container: MYSQL_PASSWORD
          description:
            en_us: "Internal database password - not exposed externally, but set it to something random"
        - container: AUTO_ASSIGN_PORT_MIN
          description:
            en_us: "Lowest port AzuraCast will auto-assign to a new station's stream - must match the published port range below"
        - container: AUTO_ASSIGN_PORT_MAX
          description:
            en_us: "Highest port AzuraCast will auto-assign to a new station's stream - must match the published port range below"
      ports:
        - container: "8080"
          description:
            en_us: "Web UI and admin panel - point your reverse proxy here"
      volumes:
        - container: /var/azuracast/library
          description:
            en_us: "Your existing music library. Point a Storage Location at this path in AzuraCast's admin to use it directly, instead of copying files into a station's own media folder."
    cap_add: []
    network_mode: bridge
    privileged: false

x-casaos:
  architectures:
    - amd64
    - arm64
  author: nmemmert
  category: Media
  description:
    en_US: >
      Self-hosted radio automation built on Icecast and Liquidsoap - playlists,
      scheduling, live DJ broadcasting, and a full web UI for managing it all.
  developer: AzuraCast
  main: azuracast
  port_map: "8080"
  scheme: http
  store_app_id: azuracast
  title:
    en_US: AzuraCast
